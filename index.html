<script>
    // 1. Datos de conexión (Limpiamos espacios con .trim() por si acaso)
    const URL = 'https://pvcpnuoztvsxtukgmfyq.supabase.co'.trim();
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2Y3BudW96dHZzeHR1a2dtZnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzExODksImV4cCI6MjA5MjgwNzE4OX0.f9NSldAkWyHDxLdBTOhJqL8FC-kHt4MaVIMd2EtPDd0'.trim();

    document.getElementById('btn').onclick = async function(e) {
        e.preventDefault();
        
        const pass1 = document.getElementById('p1').value;
        const pass2 = document.getElementById('p2').value;

        if (!pass1 || !pass2) {
            alert("⚠️ ATENCIÓN: Los campos están vacíos.");
            return;
        }

        if (pass1 !== pass2) {
            alert("❌ Las contraseñas no coinciden.");
            return;
        }

        this.disabled = true;
        this.innerText = "Cambiando...";

        try {
            // 2. Inicialización GARANTIZADA
            // Usamos la variable directamente para que no haya fallos de lectura
            const supabaseClient = window.supabase.createClient(URL, KEY);
            
            const { error } = await supabaseClient.auth.updateUser({ password: pass1 });

            if (error) {
                alert("Error de Supabase: " + error.message);
                this.disabled = false;
                this.innerText = "Guardar Cambios";
            } else {
                alert("✅ ¡ÉXITO! Contraseña actualizada.");
                document.getElementById('status').innerText = "¡Listo! Ya puedes volver a la App de Streamlit.";
                this.style.display = 'none';
            }
        } catch (err) {
            alert("Error técnico de URL: " + err.message);
            this.disabled = false;
            this.innerText = "Guardar Cambios";
        }
    };
</script>
