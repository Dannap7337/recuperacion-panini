<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Panini Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        h2 { color: #1c1e21; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #14A8FD; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0d8ed4; }
        #message { margin-top: 20px; padding: 10px; border-radius: 6px; display: none; }
        .error { background-color: #ffebe9; color: #d73a49; display: block !important; }
        .success { background-color: #e6ffed; color: #22863a; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔑 Nueva Contraseña</h2>
    <p>Ingresa y confirma tu nueva clave para acceder al álbum.</p>
    
    <input type="password" id="new_password" placeholder="Nueva Contraseña">
    <input type="password" id="confirm_password" placeholder="Confirmar Contraseña">
    
    <button id="btn-update" onclick="updatePassword()">Actualizar y Guardar</button>
    <div id="message"></div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SUPABASE_URL = 'TU_URL_DE_SUPABASE'; 
    const SUPABASE_ANON_KEY = 'TU_CLAVE_ANON_DE_SUPABASE'; 
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msgDiv = document.getElementById('message');
    const btn = document.getElementById('btn-update');

    // Función para mostrar mensajes
    function showMsg(text, isError = true) {
        msgDiv.textContent = text;
        msgDiv.className = isError ? 'error' : 'success';
    }

    async function updatePassword() {
        const pass = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (!pass || !confirm) return showMsg("Por favor, llena ambos campos.");
        if (pass !== confirm) return showMsg("Las contraseñas no coinciden.");
        if (pass.length < 6) return showMsg("Mínimo 6 caracteres.");

        btn.disabled = true;
        btn.textContent = "Procesando...";

        try {
            // Intentamos actualizar la contraseña
            const { error } = await supabase.auth.updateUser({ password: pass });

            if (error) {
                showMsg("Error de Supabase: " + error.message);
                btn.disabled = false;
                btn.textContent = "Actualizar y Guardar";
            } else {
                showMsg("✅ ¡Contraseña cambiada con éxito! Ya puedes cerrar esta página e iniciar sesión en la app.", false);
                btn.style.display = 'none';
                
                // Cerramos sesión aquí para que no quede abierta en el navegador
                await supabase.auth.signOut();
            }
        } catch (err) {
            showMsg("Error inesperado: " + err.message);
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
