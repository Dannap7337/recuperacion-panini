<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recuperar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">

    <h2>🔑 Vivo?</h2>
    
    <input type="password" id="p1" placeholder="Nueva contraseña" style="display:block; margin: 10px auto; padding: 10px;"><br>
    <input type="password" id="p2" placeholder="Repetir contraseña" style="display:block; margin: 10px auto; padding: 10px;"><br>
    
    <button id="btn" style="padding: 10px 20px; background: #14A8FD; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Guardar Cambios
    </button>

    <script>
        // ESTO DEBE APARECER APENAS CARGUE LA PÁGINA
        console.log("Script cargado");
        alert("Si ves esto, la página nueva ya cargó");

        const URL = 'https://pvcpnuoztvsxtukgmfyq.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2Y3BudW96dHZzeHR1a2dtZnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzExODksImV4cCI6MjA5MjgwNzE4OX0.f9NSldAkWyHDxLdBTOhJqL8FC-kHt4MaVIMd2EtPDd0';
        
        // Inicializamos
        const supabaseClient = window.supabase.createClient(URL, KEY);

        document.getElementById('btn').onclick = async function() {
            const pass1 = document.getElementById('p1').value;
            const pass2 = document.getElementById('p2').value;

            if (pass1 === "" || pass2 === "") {
                alert("Escribe la contraseña en ambos cuadros");
                return;
            }

            if (pass1 !== pass2) {
                alert("Las contraseñas no son iguales");
                return;
            }

            this.disabled = true;
            this.innerText = "Cambiando...";

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: pass1 });
                if (error) {
                    alert("Error de Supabase: " + error.message);
                } else {
                    alert("✅ ¡ÉXITO! Contraseña cambiada. Ya puedes entrar a la app.");
                }
            } catch (e) {
                alert("Error crítico: " + e.message);
            }
            this.disabled = false;
            this.innerText = "Guardar Cambios";
        };
    </script>
</body>
</html>
