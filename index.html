<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #14A8FD; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        #message { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔑 Nueva Contraseña</h2>
    <p>Ingresa tu nueva clave para el álbum.</p>
    <input type="password" id="new_password" placeholder="Escribe la contraseña">
    <input type="password" id="confirm_password" placeholder="Repite la contraseña">
    <button id="btn-update">Guardar Contraseña</button>
    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://pvcpnuoztvsxtukgmfyq.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2Y3BudW96dHZzeHR1a2dtZnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzExODksImV4cCI6MjA5MjgwNzE4OX0.f9NSldAkWyHDxLdBTOhJqL8FC-kHt4MaVIMd2EtPDd0'; 

    // Inicializar Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Elementos
    const btn = document.getElementById('btn-update');
    const msgDiv = document.getElementById('message');

    // Función para mostrar mensajes en pantalla
    function mostrar(texto, color) {
        msgDiv.style.display = 'block';
        msgDiv.textContent = texto;
        msgDiv.style.backgroundColor = color === 'rojo' ? '#ffebe9' : '#e6ffed';
        msgDiv.style.color = color === 'rojo' ? '#d73a49' : '#22863a';
    }

    // Escuchar el clic del botón
    btn.addEventListener('click', async () => {
        const p1 = document.getElementById('new_password').value;
        const p2 = document.getElementById('confirm_password').value;

        // Validaciones básicas
        if (!p1 || !p2) return alert("Por favor llena ambos campos");
        if (p1 !== p2) return alert("Las contraseñas no coinciden");
        if (p1.length < 6) return alert("La contraseña es muy corta (mínimo 6)");

        btn.disabled = true;
        btn.textContent = "Cambiando...";

        try {
            // Intentar actualizar
            const { data, error } = await supabase.auth.updateUser({ password: p1 });

            if (error) {
                alert("Error de Supabase: " + error.message);
                mostrar("Error: " + error.message, 'rojo');
                btn.disabled = false;
                btn.textContent = "Guardar Contraseña";
            } else {
                alert("✅ ¡Éxito! Contraseña actualizada.");
                mostrar("¡Listo! Ya puedes volver a la App de Streamlit.", 'verde');
                btn.style.display = 'none';
                await supabase.auth.signOut();
            }
        } catch (err) {
            alert("Error crítico: " + err.message);
            btn.disabled = false;
            btn.textContent = "Guardar Contraseña";
        }
    });
</script>

</body>
</html>
